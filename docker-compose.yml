services:
  template_srvc:
    build: .
    environment:
      - PYTHONPATH=/workdir
      - PYTHONUNBUFFERED=1
      - CURRENT_UID=${CURRENT_UID}
      - CURRENT_GID=${CURRENT_GID}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_TOKEN_PROD=${TELEGRAM_TOKEN_PROD}
      - FREELANCE_CHAN_ID=${FREELANCE_CHAN_ID}
      - SUPPORT_CHAT_ID=${SUPPORT_CHAT_ID}
      - DB_PATH=${DB_PATH:-../jobs2.db}
      - SSH_PROXY_HOST=${SSH_PROXY_HOST}
      - SSH_PROXY_PORT=${SSH_PROXY_PORT}
      - SSH_PROXY_USER=${SSH_PROXY_USER}
      - SSH_IDENTITY_FILE=${SSH_IDENTITY_FILE:-/workdir/.ssh_tun/id_ed25519}
      - SSH_KNOWN_HOSTS=${SSH_KNOWN_HOSTS:-/workdir/.ssh_tun/known_hosts}
      - SSH_LOCAL_SOCKS_PORT=${SSH_LOCAL_SOCKS_PORT:-2080}
      - QUIET=${QUIET:-0}
    volumes:
      - ./:/workdir/
      - ${SSH_TUN_DIR:-~/.ssh_tun}:/workdir/.ssh_tun
    command: bash -c "sleep 100001"
    stop_grace_period: 1s
    restart: always

  parser:
    extends:
      service: template_srvc
    command: bash -c "/workdir/run_parse.sh; sleep 30"

  sender:
    extends:
      service: template_srvc
    command: bash -c "python bot/send_alerts.py; sleep 20"

# cron:
#   build: .
#   volumes:
#     - /opt/parselancer/:/workdir/
#     - /opt/parselancer/cronjob:/etc/cron.d/cronjob
#   command: crontab /etc/cron.d/cronjob && cron && tail -f /var/log/cron.log

  bot:
    extends:
      service: template_srvc
    command: python bot/bot.py
    restart: always
